<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begin App | Photo Gallery</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <header class="header">
        <div class="container nav-container">
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">About</a></li>
                    <li><a href="#" class="nav-link">Why Begin</a></li>
                    <li><a href="#" class="nav-link">Features</a></li>
                    <li><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <a href="login.html" class="btn-login">Log In</a>
                <a href="form.html" class="btn-signup">SIGN UP</a>
            </div>
        </div>
    </header>

    <main id="main">
        <section class="registration-section">
            <div class="container">
                <h1 class="main-title" style="text-align: center; margin-bottom: 2rem;">Get Started</h1>
                <p style="text-align: center; color: var(--gray-text); margin-bottom: 4rem;">Create your account to
                    begin your journey.</p>

                <form action="https://httpbin.org/post" method="POST" class="auth-form">

                    <div class="form-group">
                        <label for="full-name">Full Name <span class="required-star" aria-hidden="true">*</span></label>
                        <input type="text" id="full-name" name="user_name" placeholder="Kira Gromova" required
                            aria-required="true">
                    </div>

                    <div class="form-group">
                        <label for="user-email">Email Address <span class="required-star"
                                aria-hidden="true">*</span></label>
                        <input type="email" id="user-email" name="user_email" placeholder="example@mail.com" required
                            aria-required="true">
                    </div>

                    <div class="form-group">
                        <label for="user-pass">Password <span class="required-star" aria-hidden="true">*</span></label>
                        <input type="password" id="user-pass" name="user_password" placeholder="At least 8 characters"
                            required aria-required="true">
                    </div>

                    <div class="form-controls">
                        <button type="submit" class="btn-signup">Register Now</button>
                        <button type="reset" class="btn-reset">Clear Data</button>
                    </div>

                    <p class="form-info">* These fields are mandatory for registration.</p>
                    <p class="form-switch" style="margin-top: 2.5rem; text-align: center; font-size: 1.3rem;">
                        Already have an account? <a href="login.html"
                            style="color: var(--accent-mint); font-weight: 700;">Log In here</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-container">
            <p class="copyright">&copy; 2026 Kira Gromova. All rights reserved</p>
            <nav class="footer-nav">
                <a href="grid.html" class="footer-link">Gallery</a>
                <a href="form.html" class="footer-link">Join Now</a>
            </nav>
        </div>
    </footer>
</body>

</html>
