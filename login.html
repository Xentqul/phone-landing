<!DOCTYPE html>
<html lang="en">
<!-- КОНТЕНТ НА АНГЛИЙСКОМ ПОЭТОМУ НЕ РУ -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begin App | Everything You Need</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a href="#main" class="skip-link">К основному контенту</a>

    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="mobile-menu-link">MENU</a>

            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link active">About</a></li>
                    <li><a href="#" class="nav-link">Why Begin</a></li>
                    <li><a href="#" class="nav-link">Features</a></li>
                    <li><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>

            <div class="auth-buttons">
                <a href="login.html" class="btn-login">Log In</a>
                <a href="form.html" class="btn-signup">SIGN UP</a>
            </div>
        </div>
    </header>

    <main id="main">
        <section class="auth-section">
            <div class="container">
                <h1 class="main-title" style="text-align: center; margin-bottom: 2rem;">Welcome Back</h1>
                <p style="text-align: center; color: var(--gray-text); margin-bottom: 4rem;">Enter your details to
                    access your account.</p>

                <form action="https://httpbin.org/post" method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" name="login_email" placeholder="example@mail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="login-pass">Password</label>
                        <input type="password" id="login-pass" name="login_password" placeholder="••••••••" required>
                    </div>

                    <div class="form-controls">
                        <button type="submit" class="btn-signup">Log In</button>
                    </div>

                    <p class="form-switch" style="margin-top: 2.5rem; text-align: center; font-size: 1.3rem;">
                        Don't have an account? <a href="form.html"
                            style="color: var(--accent-mint); font-weight: 700;">Sign Up here</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-container">
            <p class="copyright">&copy; 2026 Kira Gromova. All rights reserved</p>
            <nav class="footer-nav">
                <a href="grid.html" class="footer-link">Gallery</a>
                <a href="form.html" class="footer-link">Registration</a>
            </nav>
        </div>
    </footer>
</body>

</html>
